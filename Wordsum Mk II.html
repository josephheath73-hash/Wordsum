<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordsum // Cryptographic Logic</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --secondary: #22d3ee;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #020617);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
        }

        .game-container {
            flex: 2;
            min-width: 350px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            flex: 1;
            min-width: 250px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 25px;
            height: fit-content;
        }

        .sidebar h2 { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #64748b;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .header h1 { 
            text-align: center;
            font-size: 3.5rem; 
            margin: 0; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -3px;
        }

        .mode-toggles { display: flex; justify-content: center; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
        
        .pill-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .pill-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .target-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        #target-sum { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: white;
            line-height: 1;
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 4px; }
        .stat-val { font-weight: 800; font-size: 1.1rem; color: var(--text); }

        input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 2rem;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: scale(0.98); }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 6px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .letter {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            padding: 6px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.8rem;
        }

        .state-correct { background: var(--success) !important; color: #020617 !important; font-weight: 800; }
        .state-misplaced { background: #eab308 !important; color: #020617 !important; font-weight: 800; }
        .state-excluded { opacity: 0.2; filter: grayscale(1); }
        
        #msg { text-align: center; font-size: 0.85rem; height: 1.5rem; margin-bottom: 10px; font-weight: 700; }
        .success-text { color: var(--success); }
        .error-text { color: var(--danger); }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="game-container">
            <div class="header">
                <h1>Wordsum</h1>
                <div class="mode-toggles">
                    <button class="pill-btn active" id="m-score" onclick="setMode('score')">Zen</button>
                    <button class="pill-btn" id="m-time" onclick="setMode('time')">Time Trial</button>
                    <button class="pill-btn active" id="c-basic" onclick="setCipher('basic')">A=1</button>
                    <button class="pill-btn" id="c-expert" onclick="setCipher('expert')">Expert</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><span class="stat-label">Points</span><span class="stat-val" id="score">1000</span></div>
                <div class="stat-box"><span class="stat-label">Tries</span><span class="stat-val" id="guesses">0</span></div>
                <div class="stat-box"><span class="stat-label">Clock</span><span class="stat-val" id="timer">ZEN</span></div>
            </div>

            <div class="target-card">
                <span id="target-sum">--</span>
                <div style="font-size: 0.65rem; color: #64748b; margin-top:8px; letter-spacing: 2px; font-weight: 700;">ENCRYPTED TARGET KEY</div>
            </div>

            <div id="msg"></div>
            <div id="slots" style="text-align:center; font-size:2.5rem; letter-spacing:12px; margin-bottom:25px; font-family:monospace; color:var(--secondary); font-weight: 900;">____</div>

            <input type="text" id="guess-in" placeholder="TYPE WORD" maxlength="4" autocomplete="off" autofocus>
            <button class="btn-main" onclick="submitGuess()">DECRYPT DATA</button>
            
            <button onclick="initGame()" style="background:transparent; color:#475569; border:none; width:100%; margin-top:15px; cursor:pointer; font-size:0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Refresh Board</button>

            <div class="alphabet-grid" id="alpha-log"></div>
        </div>

        <div class="sidebar">
            <h2>Decryption Log</h2>
            <div id="leaderboard">
                <div style="color:#475569; font-size:0.8rem; text-align: center; padding-top: 20px;">No successful decrypts in this session.</div>
            </div>
        </div>
    </div>

        let cipher = {};
        let targetWord = "";
        let targetSum = 0;
        let score = 1000;
        let guesses = 0;
        let gameMode = 'score';
        let cipherMode = 'basic';
        let timer = null;
        let timeLeft = 120;
        let solvedWords = [];

        function setMode(m) {
            gameMode = m;
            document.getElementById('m-score').classList.toggle('active', m==='score');
            document.getElementById('m-time').classList.toggle('active', m==='time');
            initGame();
        }

        function setCipher(c) {
            cipherMode = c;
            document.getElementById('c-basic').classList.toggle('active', c==='basic');
            document.getElementById('c-expert').classList.toggle('active', c==='expert');
            initGame();
        }

        function generateCipher() {
            cipher = {};
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            if (cipherMode === 'basic') {
                alpha.forEach((c, i) => cipher[c] = i + 1);
            } else {
                let vals = Array.from({length: 26}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                alpha.forEach((c, i) => cipher[c] = vals[i]);
            }
        }

        function initGame() {
            clearInterval(timer);
            generateCipher();
            
            // Pick word and calculate sum
            const wordList = DICT[4];
            targetWord = wordList[Math.floor(Math.random() * wordList.length)];
            targetSum = 0;
            for(let char of targetWord) { targetSum += cipher[char]; }
            
            // Reset Stats
            score = 1000; guesses = 0; timeLeft = 120;
            
            // Update UI
            document.getElementById('target-sum').innerText = targetSum;
            document.getElementById('score').innerText = score;
            document.getElementById('guesses').innerText = guesses;
            document.getElementById('msg').innerText = "";
            document.getElementById('slots').innerText = "____";
            document.getElementById('guess-in').disabled = false;
            document.getElementById('guess-in').value = "";
            
            if(gameMode === 'time') {
                document.getElementById('timer').innerText = "120s";
                timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft + "s";
                    if(timeLeft <= 0) { clearInterval(timer); endGame("SYSTEM LOCKOUT - TIME OVER"); }
                }, 1000);
            } else {
                document.getElementById('timer').innerText = "ZEN";
            }
            updateAlphabet();
        }

        function updateAlphabet() {
            const log = document.getElementById('alpha-log');
            log.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(c => {
                const el = document.createElement('div');
                el.className = 'letter'; el.id = `L-${c}`;
                el.innerHTML = `<b>${c}</b><br><small>${cipher[c]}</small>`;
                log.appendChild(el);
            });
        }

        function submitGuess() {
            const inp = document.getElementById('guess-in');
            const val = inp.value.toUpperCase();
            const msg = document.getElementById('msg');
            
            if(val.length !== 4) return;

            guesses++;
            document.getElementById('guesses').innerText = guesses;

            // Highlight alphabet
            val.split('').forEach((char, i) => {
                const el = document.getElementById(`L-${char}`);
                if (!targetWord.includes(char)) el.classList.add('state-excluded');
                else if (val[i] === targetWord[i]) el.className = 'letter state-correct';
                else el.className = 'letter state-misplaced';
            });

            if (val === targetWord) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#6366f1', '#22d3ee'] });
                msg.innerHTML = '<span class="success-text">DECRYPTION SUCCESSFUL</span>';
                document.getElementById('slots').innerText = targetWord;
                recordWin();
                clearInterval(timer);
                inp.disabled = true;
            } else {
                score -= 25;
                document.getElementById('score').innerText = score;
                msg.innerHTML = '<span class="error-text">INVALID DATA SIGNATURE</span>';
                setTimeout(() => { if(inp.disabled === false) msg.innerText = ""; }, 1500);
            }
            inp.value = "";
            inp.focus();
        }

        function recordWin() {
            solvedWords.unshift({ word: targetWord, score: score });
            const board = document.getElementById('leaderboard');
            board.innerHTML = solvedWords.map(item => `
                <div class="leaderboard-item">
                    <span>${item.word}</span>
                    <span style="color:var(--secondary)">${item.score}</span>
                </div>
            `).join('');
        }

        function endGame(m) {
            document.getElementById('msg').innerHTML = `<span class="error-text">${m}</span>`;
            document.getElementById('guess-in').disabled = true;
        }

        document.getElementById('guess-in').onkeypress = (e) => { if(e.key==='Enter') submitGuess(); };
        
        // Boot game
        initGame();
    </script>
