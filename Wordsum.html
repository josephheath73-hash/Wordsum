<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphertrail // Tournament Edition</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --danger: #ff7675;
            --success: #55efc4;
            --accent: #fdcb6e;
            --text: #2d3436;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .game-container {
            max-width: 650px;
            width: 95%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .header { text-align: center; margin-bottom: 15px; }
        h1 { color: var(--primary); margin: 0; font-size: 2.5em; letter-spacing: -1.5px; }
        
        .mode-toggles {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .pill-btn {
            padding: 6px 15px;
            border: 2px solid #dfe6e9;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 800;
            cursor: pointer;
            background: white;
            transition: 0.2s;
        }

        .pill-btn.active { background: var(--text); color: white; border-color: var(--text); }

        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        .timer-flash { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .target-box {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 25px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 20px;
            color: white;
        }

        #target-sum { font-size: 4em; font-weight: 900; display: block; line-height: 1; }

        .hint-slots {
            background: #fff;
            padding: 15px;
            text-align: center;
            border: 3px solid #f1f2f6;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 2em;
            letter-spacing: 12px;
            font-family: monospace;
        }

        #msg { height: 25px; text-align: center; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }

        .input-area { display: flex; flex-direction: column; gap: 10px; }
        input {
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.5em;
            text-transform: uppercase;
            text-align: center;
            outline: none;
        }

        .btn-group { display: flex; gap: 10px; }
        button:not(.pill-btn) {
            flex: 1;
            padding: 15px;
            font-weight: 900;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            text-transform: uppercase;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-hint { background: var(--accent); color: var(--text); }
        
        table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        th { color: #b2bec3; font-size: 0.7em; padding: 10px; border-bottom: 2px solid #f1f2f6; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f2f6; font-weight: 600; }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 6px;
            margin-top: 30px;
        }

        .letter {
            background: #fff;
            border: 2px solid #f1f2f6;
            border-radius: 10px;
            padding: 6px;
            text-align: center;
        }

        .state-correct { background: var(--success) !important; color: white !important; }
        .state-misplaced { background: var(--accent) !important; color: white !important; }
        .state-excluded { opacity: 0.3; text-decoration: line-through; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s ease-in-out; border-color: var(--danger) !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>Ciphertrail</h1>
            <div class="mode-toggles">
                <button class="pill-btn active" id="btn-score" onclick="setMode('score')">SCORE MODE</button>
                <button class="pill-btn" id="btn-time" onclick="setMode('time')">TIME TRIAL</button>
                <div style="width:100%; height:5px;"></div>
                <button class="pill-btn active" id="btn-basic" onclick="setCipherMode('basic')">BASIC (A=1)</button>
                <button class="pill-btn" id="btn-expert" onclick="setCipherMode('expert')">EXPERT (RANDOM)</button>
            </div>
            <div class="mode-toggles">
                <button class="pill-btn" onclick="setLen(3)">3 LTR</button>
                <button class="pill-btn active" onclick="setLen(4)">4 LTR</button>
                <button class="pill-btn" onclick="setLen(5)">5 LTR</button>
            </div>
        </div>

        <div class="stats-bar">
            <div>SCORE<br><span id="stat-score">1000</span></div>
            <div>GUESSES<br><span id="stat-guesses">0</span></div>
            <div>STATUS<br><span id="stat-timer">READY</span></div>
        </div>
        
        <div class="target-box">
            <small id="cipher-label">BASIC CIPHER SUM</small>
            <span id="target-sum">0</span>
        </div>

        <div id="msg"></div>
        <div class="hint-slots" id="slots">_ _ _ _</div>

        <div class="input-area">
            <input type="text" id="guess-in" placeholder="ENTER WORD" autofocus autocomplete="off">
            <div class="btn-group">
                <button class="btn-main" id="btn-submit" onclick="submitGuess()">Submit</button>
                <button class="btn-hint" id="btn-hint" onclick="revealHint()">Hint</button>
            </div>
            <button style="background:#dfe6e9; color:#636e72; margin-top:10px;" onclick="initGame()">New Game</button>
        </div>

        <table>
            <thead><tr><th>GUESS</th><th>SUM</th><th>DIFF</th><th>POS</th></tr></thead>
            <tbody id="history"></tbody>
        </table>

        <div class="alphabet-grid" id="alpha-log"></div>
    </div>

        };

        let cipher = {};
        let targetWord = "";
        let targetSum = 0;
        let wordLen = 4;
        let score = 1000;
        let guesses = 0;
        let revealed = [];
        let gameMode = 'score'; // 'score' or 'time'
        let cipherMode = 'basic'; // 'basic' or 'expert'
        let timer = null;
        let timeLeft = 120;

        function setMode(m) {
            gameMode = m;
            document.getElementById('btn-score').classList.toggle('active', m==='score');
            document.getElementById('btn-time').classList.toggle('active', m==='time');
            initGame();
        }

        function setCipherMode(c) {
            cipherMode = c;
            document.getElementById('btn-basic').classList.toggle('active', c==='basic');
            document.getElementById('btn-expert').classList.toggle('active', c==='expert');
            document.getElementById('cipher-label').innerText = c === 'basic' ? "BASIC CIPHER (A=1)" : "EXPERT RANDOM CIPHER";
            initGame();
        }

        function setLen(l) {
            wordLen = l;
            document.querySelectorAll('.mode-toggles .pill-btn').forEach(b => {
                if(b.innerText.includes('LTR')) b.classList.toggle('active', b.innerText.includes(l));
            });
            initGame();
        }

        function generateCipher() {
            cipher = {};
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            if (cipherMode === 'basic') {
                alpha.forEach((c, i) => cipher[c] = i + 1);
            } else {
                let values = Array.from({length: 26}, (_, i) => i + 1);
                for (let i = values.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [values[i], values[j]] = [values[j], values[i]];
                }
                alpha.forEach((c, i) => cipher[c] = values[i]);
            }
        }

        function initGame() {
            clearInterval(timer);
            generateCipher();
            const pool = DICT[wordLen];
            targetWord = pool[Math.floor(Math.random() * pool.length)].toUpperCase();
            targetSum = calculateSum(targetWord);
            revealed = [];
            score = 1000;
            guesses = 0;
            timeLeft = 120;
            
            document.getElementById('target-sum').innerText = targetSum;
            document.getElementById('stat-score').innerText = score;
            document.getElementById('stat-guesses').innerText = guesses;
            document.getElementById('guess-in').maxLength = wordLen;
            document.getElementById('guess-in').disabled = false;
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-hint').disabled = false;
            document.getElementById('history').innerHTML = "";
            document.getElementById('msg').innerText = "";
            document.getElementById('stat-timer').classList.remove('timer-flash');

            if(gameMode === 'time') {
                document.getElementById('stat-timer').innerText = "120s";
                timer = setInterval(updateTimer, 1000);
            } else {
                document.getElementById('stat-timer').innerText = "ZEN";
            }

            updateSlots();
            updateAlphabet();
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('stat-timer').innerText = timeLeft + "s";
            if(timeLeft <= 10) document.getElementById('stat-timer').classList.add('timer-flash');
            if(timeLeft <= 0) {
                clearInterval(timer);
                gameOver("TIME UP!");
            }
        }

        function gameOver(reason) {
            document.getElementById('msg').innerText = reason;
            document.getElementById('msg').style.color = "var(--danger)";
            document.getElementById('guess-in').disabled = true;
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('btn-hint').disabled = true;
        }

        function updateAlphabet() {
            const log = document.getElementById('alpha-log');
            log.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(c => {
                const el = document.createElement('div');
                el.className = 'letter';
                el.id = `L-${c}`;
                el.innerHTML = `<b>${c}</b><small>${cipher[c]}</small>`;
                log.appendChild(el);
            });
        }

        function calculateSum(w) {
            return w.toUpperCase().split('').reduce((acc, c) => acc + (cipher[c] || 0), 0);
        }

        function updateSlots() {
            let s = "";
            for(let i=0; i<wordLen; i++) s += revealed.includes(i) ? targetWord[i] + " " : "_ ";
            document.getElementById('slots').innerText = s.trim();
        }

        function revealHint() {
            if (revealed.length < wordLen && score >= 150) {
                let av = [...Array(wordLen).keys()].filter(i => !revealed.includes(i));
                revealed.push(av[Math.floor(Math.random()*av.length)]);
                score -= 150;
                document.getElementById('stat-score').innerText = score;
                updateSlots();
            }
        }

        function submitGuess() {
            const inputEl = document.getElementById('guess-in');
            const val = inputEl.value.toUpperCase();
            const msg = document.getElementById('msg');

            if (val.length !== wordLen) return;

            const allWords = [...DICT[3], ...DICT[4], ...DICT[5]];
            if (!allWords.includes(val)) {
                msg.innerText = "NOT A VALID WORD";
                msg.style.color = "var(--danger)";
                inputEl.classList.add('shake');
                setTimeout(() => { inputEl.classList.remove('shake'); msg.innerText = ""; }, 1000);
                return;
            }

            guesses++;
            let cost = -20;
            const sum = calculateSum(val);
            const diff = sum - targetSum;
            let pos = 0;
            for(let i=0; i < wordLen; i++) if(val[i] === targetWord[i]) pos++;

            val.split('').forEach((char, i) => {
                const el = document.getElementById(`L-${char}`);
                if (!targetWord.includes(char)) el.className = 'letter state-excluded';
                else if (val[i] === targetWord[i]) el.className = 'letter state-correct';
                else el.className = 'letter state-misplaced';
            });

            if (diff === 0 && val !== targetWord) {
                cost = 50;
                msg.innerText = "+50 MATH BONUS!";
                msg.style.color = "var(--accent)";
            }

            score += cost;
            const row = document.getElementById('history').insertRow(0);
            row.innerHTML = `<td>${val}</td><td>${sum}</td><td style="color:${diff==0?'var(--success)':(diff>0?'var(--danger)':'var(--secondary)')}">${diff==0?'MATCH':(diff>0?'+'+diff:diff)}</td><td>${pos}</td>`;

            document.getElementById('stat-score').innerText = score;
            document.getElementById('stat-guesses').innerText = guesses;

            if (val === targetWord) {
                clearInterval(timer);
                document.getElementById('target-sum').innerText = "WIN!";
                if(gameMode === 'time') {
                    score += (timeLeft * 10);
                    document.getElementById('stat-score').innerText = score + " (TIME BONUS!)";
                }
                gameOver("DECRYPTED!");
                document.getElementById('msg').style.color = "var(--success)";
                revealed = [...Array(wordLen).keys()];
                updateSlots();
            }
            inputEl.value = "";
            inputEl.focus();
        }

        document.getElementById('guess-in').onkeypress = (e) => { if(e.key==='Enter') submitGuess(); };
        initGame();
    </script>
